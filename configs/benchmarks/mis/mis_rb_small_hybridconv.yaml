---
out_dir: results
metric_best: size
metric_agg: argmax
num_workers: 4
dim_out: 1
wandb:
  use: False
  name: mis_rb_small_hybridconv
  project: copt-mis

dataset:
  format: rb
  name: small
  task: graph
  split_mode: cv-kfold-5
  split_dir: splits
  node_encoder: true
  node_encoder_name: GraphStats
  graph_stats: ['degree', 'cluster_coefficient', 'triangle_count']
  multiprocessing: true
  label: false

posenc_GraphStats:
  enable: true
  model: Linear
  dim_pe: 32
  raw_norm_type: none

posenc_LapPE:
  enable: false
  eigen:
    laplacian_norm: none
    eigvec_norm: L2
    max_freqs: 4
    skip_zero_freq: true
    eigvec_abs: true
  model: DeepSet
  dim_pe: 32
  layers: 2
  n_heads: 4
  raw_norm_type: none

posenc_RWSE:
  enable: false
  kernel:
    times_func: range(2,22)
  model: Linear
  dim_pe: 32
  raw_norm_type: BatchNorm

posenc_NormalRE:
  enable: false
  dim_pe: 16

train:
  mode: copt
  task: mis
  batch_size: 256
  val_period: 5
  ckpt_period: 100
  ckpt_best: true
  log_probs: false

model:
  type: gnn
  loss_fun: mis_loss
  edge_decoding: dot
  graph_pooling: mean

gnn:
  head: copt_inductive_node
  layers_pre_mp: 4
  layers_mp: 16
  layers_post_mp: 1
  dim_inner: 256
  layer_type: hybridconv
  stage_type: skipsum
  batchnorm: true
  act: relu
  last_act: sigmoid
  dropout: 0.3
  agg: mean
  normalize_adj: false

optim:
  base_lr: 0.003
  max_epoch: 200
  optimizer: adam
  weight_decay: 1e-5
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
  entropy:
    enable: false
    scheduler: linear-energy
    base_temp: 1.0
    min_temp: 0.001

mis_loss:
  beta: 1.0

metrics:
  mis:
    dec_length: 100
