---
out_dir: results
# metric_best: gnn_cut
metric_best: loss
metric_agg: argmin        # cut size is lower-is-better
num_workers: 4
# dim_out: 1
dim_out: 2
wandb:
  use: False
  name: gp_sbm_small
  project: copt-gp

dataset:
  format: sbm
  name: small             # uses cfg.sbm.small (n_min=50, n_max=100, k=2, p_in=0.7, p_out=0.1)
  task: graph
  split_mode: cv-kfold-5
  split_dir: splits
  node_encoder: true
  node_encoder_name: GraphStats
  graph_stats: ['degree', 'cluster_coefficient', 'triangle_count']
  multiprocessing: true
  label: false

posenc_GraphStats:
  enable: true
  model: Linear
  dim_pe: 32
  raw_norm_type: none

posenc_LapPE:
  enable: false
  eigen:
    laplacian_norm: none
    eigvec_norm: L2
    max_freqs: 4
    skip_zero_freq: true
    eigvec_abs: true
  model: DeepSet
  dim_pe: 32
  layers: 2
  n_heads: 4
  raw_norm_type: none

posenc_RWSE:
  enable: false
  kernel:
    times_func: range(2,22)
  model: Linear
  dim_pe: 32
  raw_norm_type: BatchNorm

posenc_NormalRE:
  enable: false
  dim_pe: 16

train:
  mode: copt
  task: gp                # must match key in EVAL_FUNCTION_DICT
  batch_size: 256
  val_period: 1
  # ckpt_period: 100
  ckpt_period: 1
  ckpt_best: true
  log_probs: true         # log mean/std of GNN output probabilities each step

model:
  type: gnn
  loss_fun: gp_loss       # must match @register_loss name
  edge_decoding: dot
  graph_pooling: mean

gnn:
  head: copt_inductive_node
  layers_pre_mp: 4
  layers_mp: 16
  layers_post_mp: 1
  dim_inner: 256
  layer_type: gcon
  stage_type: skipsum
  batchnorm: true
  act: elu
  # last_act: sigmoid       # p in [0,1]; loss uses y = 2p - 1
  last_act: softmax       # p in [0,1]; loss uses y = 2p - 1
  dropout: 0.3
  agg: mean
  normalize_adj: false

optim:
  base_lr: 0.003
  max_epoch: 10
  optimizer: adam
  weight_decay: 1e-5
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
  entropy:
    enable: false
    scheduler: linear-energy
    base_temp: 1.0
    min_temp: 0.001

gp_loss:
  balance: 1.0    # weight on balance constraint; increase if still collapsing

# Evaluation hyperparameters
metrics:
  gp:
    k: 2
