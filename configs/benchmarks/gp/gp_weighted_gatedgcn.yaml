---
out_dir: results
metric_best: loss
metric_agg: argmin
num_workers: 4
dim_out: 1          # scalar sigmoid per node; decode as x >= 0.5 → k=2 partition
wandb:
  use: False
  name: gp_weighted_gatedgcn
  project: copt-gp

dataset:
  format: weighted_gp
  name: mixed
  task: graph
  split_mode: cv-kfold-5
  split_dir: splits
  node_encoder: true
  node_encoder_name: GraphStats
  graph_stats: ['degree', 'cluster_coefficient', 'triangle_count']
  multiprocessing: true
  label: false

posenc_GraphStats:
  enable: true
  model: Linear
  dim_pe: 32
  raw_norm_type: none

posenc_LapPE:
  enable: false
  eigen:
    laplacian_norm: none
    eigvec_norm: L2
    max_freqs: 4
    skip_zero_freq: true
    eigvec_abs: true
  model: DeepSet
  dim_pe: 32
  layers: 2
  n_heads: 4
  raw_norm_type: none

posenc_RWSE:
  enable: false
  kernel:
    times_func: range(2,22)
  model: Linear
  dim_pe: 32
  raw_norm_type: BatchNorm

posenc_NormalRE:
  enable: false
  dim_pe: 16

train:
  mode: copt
  task: gp
  batch_size: 64
  val_period: 1
  ckpt_period: 1
  ckpt_best: true
  log_probs: true

model:
  type: gnn
  loss_fun: gp_loss_balanced
  edge_decoding: dot
  graph_pooling: mean

gnn:
  head: copt_inductive_node
  layers_pre_mp: 2
  layers_mp: 16
  layers_post_mp: 1
  dim_inner: 256
  layer_type: gatedgcnconv
  stage_type: skipsum
  batchnorm: true
  act: elu
  last_act: sigmoid
  dropout: 0.3
  agg: mean
  normalize_adj: false
  edge_in_dim: 1   # edge_attr is a scalar weight → project 1→dim_inner

optim:
  base_lr: 0.001
  max_epoch: 100
  optimizer: adam
  weight_decay: 1e-5
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
  clip_grad_norm: true   # prevents O(n^3) loss from exploding gradients
  entropy:
    enable: false
    scheduler: linear-energy
    base_temp: 1.0
    min_temp: 0.001

gp_loss_balanced:
  beta: 100.0
  gamma: 100.0
  k: 2

metrics:
  gp:
    k: 2

weighted_gp:
  num_samples: 1000
  mixed:
    n: 100
    eps: 0.05
